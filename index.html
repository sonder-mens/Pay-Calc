<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonder Mens — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0f1a14;color:#e8e0cc;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#162019;border:1px solid #2a3a2e;border-radius:12px;padding:48px 40px;width:360px;box-shadow:0 8px 40px rgba(0,0,0,0.4);text-align:center}
.logo{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:#c9a94e;letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
.subtitle{color:#8a8472;font-size:13px;letter-spacing:1px;margin-bottom:36px}
label{font-size:12px;color:#8a8472;text-transform:uppercase;letter-spacing:.8px;display:block;text-align:left;margin-bottom:6px}
input{width:100%;padding:14px 16px;background:#0f1a14;border:1px solid #2a3a2e;border-radius:8px;color:#e8e0cc;font-family:'DM Sans',sans-serif;font-size:18px;text-align:center;letter-spacing:8px;transition:border-color .2s}
input:focus{outline:none;border-color:#9a7d3a}
input::placeholder{letter-spacing:2px;color:#8a8472}
.btn{width:100%;padding:14px;background:#c9a94e;color:#0f1a14;border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;margin-top:20px;transition:background .2s}
.btn:hover{background:#e6c55a}
.error{color:#c44b4b;font-size:13px;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">Sonder Mens</div>
  <div class="subtitle">Pay Calculator</div>
  <label>Enter PIN</label>
  <input type="password" id="pin" placeholder="••••" maxlength="6" autofocus
    onkeydown="if(event.key==='Enter')login()">
  <button class="btn" onclick="login()">Access</button>
  <div class="error" id="err">Incorrect PIN</div>
</div>
<script>
// PIN is hashed so it's not visible in source code
// Default PIN: 1234 → SHA-256 hash
const PIN_HASH = '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4';

async function hashPin(pin) {
  const enc = new TextEncoder().encode(pin);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function login() {
  const pin = document.getElementById('pin').value;
  const hash = await hashPin(pin);
  if (hash === PIN_HASH) {
    sessionStorage.setItem('sonder_auth', 'true');
    window.location.href = '/app.html';
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pin').value = '';
    document.getElementById('pin').focus();
  }
}

// If already authenticated, go straight to app
if (sessionStorage.getItem('sonder_auth') === 'true') {
  window.location.href = '/app.html';
}
</script>
</body>
</html>
